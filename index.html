<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Name — Photography</title>
  <meta name="description" content="Photography portfolio of Your Name." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <a href="index.html" class="brand">Your Name <span>Photography</span></a>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
    <nav>
      <ul>
        <li><a href="index.html" class="active">Work</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <img src="images/hero.jpg" alt="Featured photograph" />
    <div class="hero-content">
      <h1>Your Name</h1>
      <p>Photographer capturing light, place, and people.</p>
    </div>

  <main class="gallery-section">
